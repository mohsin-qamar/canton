<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#b91c1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BATIK">
<title>BATIK - Canton Fair Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #f5f5f4; color: #1c1917; padding-bottom: 100px;
    -webkit-text-size-adjust: 100%;
  }

  /* Prevent input zoom on iOS */
  input, textarea, select { font-size: 16px !important; }

  /* === HEADER === */
  .header {
    background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%);
    color: white; padding: 14px 16px;
    padding-top: calc(14px + env(safe-area-inset-top));
    position: sticky; top: 0; z-index: 30;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: flex; align-items: center; gap: 10px;
  }
  .header-title { flex: 1; min-width: 0; }
  .header h1 { margin: 0; font-size: 18px; font-weight: 600; line-height: 1.2; }
  .header .subtitle { font-size: 12px; color: #fecaca; margin-top: 3px; }
  .header button {
    background: rgba(255,255,255,0.1); border: none; color: white;
    padding: 8px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    min-width: 40px; min-height: 40px; font-size: 18px;
  }
  .header button:active { background: rgba(255,255,255,0.25); }

  /* === BATIK LOGO === */
  .batik-logo {
    font-family: 'Cinzel', 'Trajan Pro', 'Optima', Georgia, 'Times New Roman', serif;
    font-weight: 500;
    letter-spacing: 0.25em;
    font-size: 22px;
    line-height: 1;
  }
  .batik-logo-large {
    font-family: 'Cinzel', 'Trajan Pro', 'Optima', Georgia, 'Times New Roman', serif;
    font-weight: 500;
    letter-spacing: 0.3em;
    font-size: 26px;
    line-height: 1;
    padding-right: 0.3em;
  }

  /* === SEARCH & FILTERS === */
  .search-section { background: white; border-bottom: 1px solid #e7e5e4; }
  .search-bar { padding: 12px 16px 8px; position: relative; }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 40px; background: #f5f5f4;
    border: none; border-radius: 10px; font-size: 16px; outline: none;
  }
  .search-bar input:focus { background: white; box-shadow: 0 0 0 2px #b91c1c; }
  .search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.4; font-size: 16px; }

  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding: 8px 16px 12px; -webkit-overflow-scrolling: touch; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 6px 14px; border-radius: 16px; border: 1px solid #d6d3d1;
    background: white; font-size: 13px; cursor: pointer; white-space: nowrap;
    color: #44403c;
  }
  .filter-chip.active { background: #b91c1c; color: white; border-color: #b91c1c; }

  /* === VENDOR LIST === */
  .vendor-list { background: white; }
  .vendor-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border-bottom: 1px solid #f5f5f4; cursor: pointer;
  }
  .vendor-item:active { background: #fafaf9; }
  .vendor-avatar {
    width: 52px; height: 52px; border-radius: 10px; background: #fee2e2;
    color: #b91c1c; display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 18px; flex-shrink: 0; overflow: hidden;
  }
  .vendor-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .vendor-info { flex: 1; min-width: 0; }
  .vendor-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vendor-meta { font-size: 12px; color: #78716c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .vendor-stars { color: #f59e0b; font-size: 11px; margin-top: 3px; letter-spacing: 1px; }
  .vendor-stars .empty { color: #d6d3d1; }
  .vendor-badge {
    background: #f5f5f4; color: #44403c; font-size: 11px;
    padding: 4px 10px; border-radius: 12px; flex-shrink: 0; font-weight: 500;
  }

  .empty { padding: 60px 24px; text-align: center; color: #78716c; }
  .empty-icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }

  /* === FAB === */
  .fab {
    position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); right: 24px;
    width: 64px; height: 64px; border-radius: 50%; background: #b91c1c; color: white;
    border: none; box-shadow: 0 4px 16px rgba(185,28,28,0.4); font-size: 32px;
    cursor: pointer; z-index: 40; line-height: 1;
  }
  .fab:active { background: #991b1b; transform: scale(0.95); }

  /* === FORMS === */
  .form { padding: 16px; }
  .section { margin-bottom: 16px; }
  .section-title {
    font-size: 11px; font-weight: 700; color: #78716c;
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 8px; padding-left: 4px;
  }
  .section-body { background: white; border-radius: 10px; padding: 14px; border: 1px solid #e7e5e4; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #57534e; margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 11px 12px; border: 1px solid #d6d3d1; border-radius: 8px;
    font-size: 16px; font-family: inherit; background: white; outline: none;
    -webkit-appearance: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: #b91c1c; box-shadow: 0 0 0 3px rgba(185,28,28,0.15);
  }
  .field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  /* Phone field with +86 prefix */
  .phone-input { display: flex; }
  .phone-prefix {
    background: #f5f5f4; border: 1px solid #d6d3d1; border-right: none;
    padding: 11px 12px; border-radius: 8px 0 0 8px; font-size: 16px;
    color: #44403c; font-weight: 600; min-width: 56px; text-align: center;
  }
  .phone-input input {
    border-radius: 0 8px 8px 0 !important;
    flex: 1;
  }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 8px 14px; border-radius: 18px; border: 1px solid #d6d3d1;
    background: white; font-size: 14px; cursor: pointer; user-select: none;
    color: #44403c;
  }
  .chip.active { background: #b91c1c; color: white; border-color: #b91c1c; }
  .chip.add-custom { border-style: dashed; color: #78716c; }

  /* Star rating */
  .star-rating { display: flex; gap: 4px; padding: 4px 0; }
  .star {
    font-size: 32px; color: #d6d3d1; cursor: pointer; user-select: none;
    transition: transform 0.1s; line-height: 1;
  }
  .star.active { color: #f59e0b; }
  .star:active { transform: scale(1.2); }
  .rating-label { font-size: 12px; color: #78716c; margin-top: 4px; min-height: 16px; }

  /* === BUTTONS === */
  .btn {
    padding: 13px 16px; border-radius: 10px; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-family: inherit; min-height: 48px;
  }
  .btn-primary { background: #b91c1c; color: white; }
  .btn-primary:active { background: #991b1b; }
  .btn-secondary { background: #e7e5e4; color: #292524; }
  .btn-secondary:active { background: #d6d3d1; }
  .btn-danger { background: #fee2e2; color: #b91c1c; }
  .btn-block { width: 100%; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; }

  /* === PHOTO === */
  .photo-capture-large {
    border: 2px dashed #d6d3d1; border-radius: 10px; padding: 24px;
    text-align: center; color: #78716c; cursor: pointer; background: white;
    display: block;
  }
  .photo-capture-large:active { border-color: #b91c1c; color: #b91c1c; }
  .photo-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .photo-thumb { position: relative; flex-shrink: 0; width: 96px; height: 96px; border-radius: 10px; overflow: hidden; background: #f5f5f4; }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .remove {
    position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,0.7);
    color: white; border: none; border-radius: 50%; width: 22px; height: 22px;
    cursor: pointer; font-size: 12px;
  }
  .add-photo {
    width: 96px; height: 96px; flex-shrink: 0; border: 2px dashed #d6d3d1;
    border-radius: 10px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; background: white; cursor: pointer; color: #78716c;
    font-size: 11px; gap: 4px;
  }

  /* === VENDOR DETAIL === */
  .vendor-card { background: white; padding: 16px; border-bottom: 1px solid #e7e5e4; }
  .vendor-card .card-photo {
    width: 100%; max-height: 200px; object-fit: contain;
    background: #f5f5f4; border-radius: 8px; margin-bottom: 12px;
  }
  .info-row { display: flex; gap: 8px; padding: 5px 0; font-size: 14px; }
  .info-label { color: #78716c; min-width: 90px; flex-shrink: 0; }
  .info-value { flex: 1; word-break: break-word; }
  .info-value a { color: #b91c1c; text-decoration: underline; }
  .vendor-rating-display { padding: 8px 0; }
  .vendor-rating-display .stars-big { color: #f59e0b; font-size: 18px; letter-spacing: 2px; }
  .vendor-rating-display .stars-big .empty { color: #d6d3d1; }

  .notes-box {
    background: #fef3c7; border: 1px solid #fde68a; padding: 12px;
    border-radius: 8px; font-size: 14px; white-space: pre-wrap; margin-top: 12px;
    line-height: 1.5;
  }

  /* === PRODUCTS === */
  .product-list { padding: 12px 16px; }
  .product-card {
    background: white; border: 1px solid #e7e5e4; border-radius: 10px;
    overflow: hidden; margin-bottom: 12px;
  }
  .product-photos { display: flex; overflow-x: auto; background: #f5f5f4; -webkit-overflow-scrolling: touch; }
  .product-photos img { height: 120px; width: 120px; object-fit: cover; flex-shrink: 0; border-right: 1px solid white; }
  .product-photos .label-tag {
    position: absolute; bottom: 4px; left: 4px;
    background: rgba(0,0,0,0.7); color: white; font-size: 10px;
    padding: 2px 6px; border-radius: 4px;
  }
  .product-photo-wrap { position: relative; flex-shrink: 0; }
  .product-body { padding: 12px; }
  .product-header { display: flex; justify-content: space-between; gap: 8px; }
  .product-name { font-weight: 600; flex: 1; font-size: 15px; }
  .product-cat { font-size: 11px; color: #78716c; margin-top: 2px; }
  .product-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .product-actions button {
    background: transparent; border: none; padding: 6px 10px; cursor: pointer;
    color: #78716c; font-size: 14px; border-radius: 6px;
  }
  .product-actions button:active { background: #f5f5f4; }
  .fabric-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .fabric-tag { background: #fee2e2; color: #991b1b; font-size: 11px; padding: 3px 8px; border-radius: 10px; }
  .product-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-top: 8px; font-size: 12px; }
  .spec-label { color: #78716c; }
  .product-notes {
    font-size: 13px; background: #f5f5f4; padding: 10px; border-radius: 6px;
    margin-top: 8px; white-space: pre-wrap; line-height: 1.4;
  }

  .section-header {
    padding: 14px 16px 8px; display: flex; justify-content: space-between;
    align-items: center; background: #f5f5f4;
  }
  .section-header h2 { margin: 0; font-size: 15px; color: #44403c; font-weight: 600; }

  audio { width: 100%; height: 40px; }

  .recording-indicator {
    display: flex; align-items: center; gap: 6px;
    color: #b91c1c; font-family: monospace; font-weight: 600;
  }
  .recording-dot { width: 8px; height: 8px; border-radius: 50%; background: #b91c1c; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .alert {
    background: #fef3c7; border: 1px solid #fde68a; color: #78350f;
    padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px;
    line-height: 1.4;
  }
  .alert-info { background: #dbeafe; border-color: #bfdbfe; color: #1e40af; }
  .alert-error { background: #fee2e2; border-color: #fecaca; color: #991b1b; }

  /* Backup reminder banner */
  .backup-banner {
    background: #fef3c7; border-bottom: 1px solid #fde68a; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: #78350f;
  }
  .backup-banner.success { background: #d1fae5; border-color: #a7f3d0; color: #065f46; }
  .backup-banner .bb-text { flex: 1; line-height: 1.3; }
  .backup-banner button {
    background: #b91c1c; color: white; border: none; padding: 8px 12px;
    border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px;
    white-space: nowrap;
  }
  .backup-banner .dismiss-btn { background: transparent; color: #78350f; padding: 4px 8px; }

  /* GitHub status indicator */
  .github-status {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    padding: 3px 8px; border-radius: 10px; margin-left: 8px;
  }
  .github-status.ok { background: #d1fae5; color: #065f46; }
  .github-status.error { background: #fee2e2; color: #991b1b; }
  .github-status.syncing { background: #dbeafe; color: #1e40af; }

  /* Action sheet for export options */
  .action-sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .action-sheet {
    background: white; border-radius: 14px 14px 0 0; padding: 8px;
    width: 100%; max-width: 500px; padding-bottom: calc(8px + env(safe-area-inset-bottom));
  }
  .action-sheet h3 {
    margin: 0; padding: 14px 16px 8px; font-size: 13px; color: #78716c;
    text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
  }
  .action-sheet-btn {
    width: 100%; text-align: left; background: white; border: none;
    padding: 14px 16px; font-size: 16px; cursor: pointer; border-radius: 8px;
    display: flex; align-items: center; gap: 12px; color: #1c1917;
    font-family: inherit;
  }
  .action-sheet-btn:active { background: #f5f5f4; }
  .action-sheet-btn .icon { font-size: 22px; width: 28px; text-align: center; }
  .action-sheet-btn .desc { font-size: 12px; color: #78716c; margin-top: 2px; }
  .action-sheet-btn .label-wrap { flex: 1; }
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal { background: white; border-radius: 14px; padding: 20px; width: 100%; max-width: 360px; }
  .modal h3 { margin: 0 0 12px 0; font-size: 17px; }
  .modal input {
    width: 100%; padding: 12px; border: 1px solid #d6d3d1; border-radius: 8px;
    font-size: 16px; margin-bottom: 16px; outline: none;
  }
  .modal input:focus { border-color: #b91c1c; }
  .modal label { display: block; font-size: 12px; font-weight: 600; color: #57534e; margin-bottom: 6px; }
  .modal .desc-text { font-size: 12px; color: #78716c; margin-bottom: 12px; line-height: 1.4; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// =================== CONSTANTS ===================
const DEFAULT_VENDOR_CATEGORIES = ['Fabrics', 'Garments', 'Accessories'];

// Universal product categories (not Pakistan-specific)
const DEFAULT_PRODUCT_CATEGORIES = [
  // Fabrics
  'Cotton Fabric', 'Linen Fabric', 'Silk Fabric', 'Polyester Fabric', 'Viscose/Rayon Fabric',
  'Blended Fabric', 'Denim Fabric', 'Knit Fabric', 'Lace Fabric', 'Lining Fabric',
  'Functional/Technical Fabric',
  // Garments
  'Tops/Shirts', 'Bottoms/Trousers', 'Dresses', 'Outerwear/Jackets', 'Activewear',
  'Sleepwear/Loungewear', 'Underwear/Lingerie', 'Kidswear', 'Suits',
  // Accessories
  'Buttons', 'Zippers', 'Labels & Tags', 'Threads & Yarns', 'Trims & Ribbons',
  'Hangtags', 'Packaging', 'Embellishments',
  // Other
  'Other'
];

const DEFAULT_FABRIC_TYPES = [
  'Woven', 'Knit', 'Ecru / Greige', 'Dyed', 'Printed', 'Embroidered',
  'Yarn-dyed', 'Lace', 'Denim', 'Lawn', 'Cambric', 'Chiffon', 'Silk', 'Linen'
];

const RATING_LABELS = {
  0: '',
  1: '★ Unlikely',
  2: '★★ Possibly',
  3: '★★★ Maybe',
  4: '★★★★ Likely',
  5: '★★★★★ Very Likely'
};

// =================== STATE ===================
let state = {
  view: 'vendors',
  vendors: [],
  selectedVendorId: null,
  editingProductId: null,
  search: '',
  filterCategory: 'all', // 'all', 'Fabrics', 'Garments', 'Accessories', or custom
  customVendorCategories: [],
  customProductCategories: [],
  customFabricTypes: [],
  profile: {
    name: '',
    company: 'BATIK',
    title: '',
    email: '',
    phone: '',
    website: '',
    intro: 'BATIK is a Pakistan-based company specializing in quality fabrics and garments, serving both the traditional Pakistani clothing market and Western garment industry. We work with woven, ecru, dyed, printed, and embroidered fabrics.',
    githubUser: '',
    githubRepo: '',
    githubToken: '',
    githubEnabled: false
  },
  vendorForm: null,
  productForm: null,
  modal: null,
  lastBackupAt: 0,
  changesSinceBackup: 0,
  githubStatus: '', // '', 'syncing', 'ok', 'error'
  githubLastError: '',
};

// =================== STORAGE ===================
function saveState() {
  try {
    localStorage.setItem('cf_vendors', JSON.stringify(state.vendors));
    localStorage.setItem('cf_profile', JSON.stringify(state.profile));
    localStorage.setItem('cf_customVendorCats', JSON.stringify(state.customVendorCategories));
    localStorage.setItem('cf_customProductCats', JSON.stringify(state.customProductCategories));
    localStorage.setItem('cf_customFabricTypes', JSON.stringify(state.customFabricTypes));
    localStorage.setItem('cf_lastBackupAt', String(state.lastBackupAt));
    localStorage.setItem('cf_changesSinceBackup', String(state.changesSinceBackup));
  } catch (e) {
    alert('Storage full! Please export your data and consider removing some photos.');
  }
}

function loadState() {
  try {
    const v = localStorage.getItem('cf_vendors');
    if (v) state.vendors = JSON.parse(v);
    const p = localStorage.getItem('cf_profile');
    if (p) state.profile = { ...state.profile, ...JSON.parse(p) };
    const vc = localStorage.getItem('cf_customVendorCats');
    if (vc) state.customVendorCategories = JSON.parse(vc);
    const pc = localStorage.getItem('cf_customProductCats');
    if (pc) state.customProductCategories = JSON.parse(pc);
    const ft = localStorage.getItem('cf_customFabricTypes');
    if (ft) state.customFabricTypes = JSON.parse(ft);
    const lba = localStorage.getItem('cf_lastBackupAt');
    if (lba) state.lastBackupAt = parseInt(lba) || 0;
    const csb = localStorage.getItem('cf_changesSinceBackup');
    if (csb) state.changesSinceBackup = parseInt(csb) || 0;
  } catch (e) { console.error(e); }
}

// Mark a change happened (called on save vendor/product)
function markChange() {
  state.changesSinceBackup = (state.changesSinceBackup || 0) + 1;
  saveState();
}

// Check if reminder banner should show
function shouldShowBackupReminder() {
  if (!state.lastBackupAt) {
    // Never backed up — show only if there are changes
    return state.changesSinceBackup > 0;
  }
  const hoursSince = (Date.now() - state.lastBackupAt) / (1000 * 60 * 60);
  return hoursSince >= 6 || state.changesSinceBackup >= 5;
}

function formatTimeAgo(ts) {
  if (!ts) return 'never';
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins} min ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

// =================== HELPERS ===================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
const escapeAttr = escapeHtml;

function compressImage(file, maxDim = 1200, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = h * maxDim / w; w = maxDim; }
          else { w = w * maxDim / h; h = maxDim; }
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getAllVendorCategories() {
  return [...DEFAULT_VENDOR_CATEGORIES, ...state.customVendorCategories];
}
function getAllProductCategories() {
  // Custom ones inserted before "Other"
  const defaults = DEFAULT_PRODUCT_CATEGORIES.filter(c => c !== 'Other');
  return [...defaults, ...state.customProductCategories, 'Other'];
}
function getAllFabricTypes() {
  return [...DEFAULT_FABRIC_TYPES, ...state.customFabricTypes];
}

function renderStars(rating, interactive = false, size = 'normal') {
  let html = '<div class="' + (size === 'big' ? 'stars-big' : '') + '">';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= (rating || 0);
    if (interactive) {
      html += `<span class="star ${filled ? 'active' : ''}" data-action="set-rating" data-value="${i}">★</span>`;
    } else {
      html += `<span class="${filled ? '' : 'empty'}">★</span>`;
    }
  }
  html += '</div>';
  return html;
}

function renderVendorList() {
  const q = state.search.toLowerCase();
  const filtered = state.vendors.filter(v => {
    // Category filter
    if (state.filterCategory !== 'all' && (v.vendorCategory || '') !== state.filterCategory) return false;
    // Search filter (search in company, booth, contact, designation, notes, and products)
    if (!q) return true;
    const haystack = [
      v.company, v.booth, v.contact, v.designation, v.notes, v.vendorCategory,
      ...(v.products || []).flatMap(p => [p.name, p.category, ...(p.fabricTypes || []), p.notes])
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(q);
  });

  // Build filter row
  const cats = ['all', ...DEFAULT_VENDOR_CATEGORIES, ...state.customVendorCategories];
  let filterChips = cats.map(c => {
    const label = c === 'all' ? 'All' : c;
    const active = state.filterCategory === c ? 'active' : '';
    return `<div class="filter-chip ${active}" data-action="filter-cat" data-value="${escapeAttr(c)}">${escapeHtml(label)}</div>`;
  }).join('');

  let html = `<div class="search-section">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search company, booth, product, notes…" value="${escapeAttr(state.search)}">
    </div>
    <div class="filter-row">${filterChips}</div>
  </div>`;

  if (filtered.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">${(state.search || state.filterCategory !== 'all') ? '🔍' : '🏢'}</div>
      <div style="font-weight:600; margin-bottom:4px;">${(state.search || state.filterCategory !== 'all') ? 'No matches' : 'No vendors yet'}</div>
      <div style="font-size:14px;">${(state.search || state.filterCategory !== 'all') ? 'Try different filters' : 'Tap + to add your first vendor'}</div>
    </div>`;
  } else {
    html += '<div class="vendor-list">';
    filtered.forEach(v => {
      const initial = (v.company || '?').trim().charAt(0).toUpperCase();
      const stars = v.rating > 0 ? `<div class="vendor-stars">${'★'.repeat(v.rating)}<span class="empty">${'★'.repeat(5 - v.rating)}</span></div>` : '';
      const cat = v.vendorCategory ? `<span style="color:#b91c1c; font-weight:500;">${escapeHtml(v.vendorCategory)}</span>` : '';
      const meta = [
        v.booth ? 'Booth ' + escapeHtml(v.booth) : '',
        escapeHtml(v.contact || ''),
        cat
      ].filter(Boolean).join(' · ');
      html += `<div class="vendor-item" data-action="open-vendor" data-id="${v.id}">
        <div class="vendor-avatar">
          ${v.cardPhoto ? `<img src="${v.cardPhoto}" alt="">` : escapeHtml(initial)}
        </div>
        <div class="vendor-info">
          <div class="vendor-name">${escapeHtml(v.company || 'Unnamed vendor')}</div>
          <div class="vendor-meta">${meta}</div>
          ${stars}
        </div>
        <div class="vendor-badge">${v.products?.length || 0}</div>
      </div>`;
    });
    html += '</div>';
  }

  html += `<button class="fab" data-action="add-vendor" aria-label="Add vendor">+</button>`;
  return html;
}

function renderProductCard(p) {

        html += `<div class="product-photo-wrap"><img src="${ph.src}" alt=""><span class="label-tag">Code</span></div>`;

  html += `<div class="product-body">

    html += `<div class="fabric-tags">`;
    p.fabricTypes.forEach(f => html += `<span class="fabric-tag">${escapeHtml(f)}</span>`);
    html += `</div>`;

  const specs = [
    ['Comp', p.composition], ['GSM', p.gsm], ['Width', p.width],
    ['Price', p.price], ['MOQ', p.moq], ['Lead', p.leadTime],
    ['Sample', p.sample], ['Finish', p.dyeingMethod], ['Code', p.barcode]

  if (specs.length > 0) {

    specs.forEach(([k, v]) => html += `<div><span class="spec-label">${k}:</span> ${escapeHtml(v)}</div>`);
    html += `</div>`;

  if (p.notes) html += `<div class="product-notes">${escapeHtml(p.notes)}</div>`;
  if (p.voiceNote) html += `<div style="margin-top:8px;"><audio controls src="${p.voiceNote}" style="height:32px;"></audio></div>`;

  html += `</div></div>`;
  return html;

// =================== EVENT HANDLERS ===================
function attachEventListeners() {
  // Search input
  const searchInput = document.getElementById('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.search = e.target.value;
      // Re-render only the list portion to avoid losing input focus
      const listEl = document.querySelector('.vendor-list') || document.querySelector('.empty');
      if (listEl) {
        const tmp = document.createElement('div');
        const fullHtml = renderVendorList();
        tmp.innerHTML = fullHtml;
        // The search section is the first child, skip it; replace from second child onwards
        const newSearch = tmp.querySelector('.search-section');
        const newList = tmp.querySelector('.vendor-list') || tmp.querySelector('.empty');
        if (newList) listEl.replaceWith(newList);
      }
    });
  }

  // Form fields → update state
  document.querySelectorAll('[data-field]').forEach(el => {
    const handler = (e) => {
      const name = el.dataset.field;
      let val = el.value;

      // Special handling for category select with "Add new"
      if (el.dataset.specialCategory === '1' && val === '__ADD_NEW__') {
        el.value = state.productForm[name] || '';
        openModal('Add new product category', '', '', (newCat) => {
          if (newCat) {
            if (!state.customProductCategories.includes(newCat)) {
              state.customProductCategories.push(newCat);
            }
            state.productForm[name] = newCat;
            saveState();
            render();
          }
        });
        return;
      }

      if (state.view === 'add-vendor' || state.view === 'edit-vendor') state.vendorForm[name] = val;
      else if (state.view === 'add-product' || state.view === 'edit-product') state.productForm[name] = val;
      else if (state.view === 'settings') state.profile[name] = val;
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(el => {
    const action = el.dataset.action;
    const eventType = (el.tagName === 'INPUT' && el.type === 'file') ? 'change' : 'click';
    el.addEventListener(eventType, (e) => handleAction(action, el, e));
  });

  // Hidden file input for import
  let importInput = document.getElementById('hidden-import');
  if (!importInput) {
    importInput = document.createElement('input');
    importInput.type = 'file';
    importInput.accept = 'application/json,.json';
    importInput.id = 'hidden-import';
    importInput.style.display = 'none';
    importInput.addEventListener('change', handleImport);
    document.body.appendChild(importInput);
  }
}

async function handleAction(action, el, evt) {
  switch (action) {
    case 'back': goBack(); break;
    case 'export':
    case 'open-export':
      state.actionSheet = true;
      render();
      break;
    case 'close-sheet':
      state.actionSheet = false;
      render();
      break;
    case 'download-backup':
      state.actionSheet = false;
      exportData();
      markBackupDone();
      render();
      break;
    case 'email-backup':
      state.actionSheet = false;
      emailBackup();
      break;
    case 'manual-github-backup':
      state.actionSheet = false;
      render();
      triggerGithubBackup(true);
      break;
    case 'test-github':
      testGithubConnection();
      break;
    case 'disable-github':
      state.profile.githubEnabled = false;
      state.githubStatus = '';
      saveState();
      render();
      break;
    case 'restore-github':
      restoreFromGithub();
      break;
    case 'import':
      document.getElementById('hidden-import').click();
      break;
    case 'settings': state.view = 'settings'; render(); break;
    case 'open-vendor':
      state.selectedVendorId = el.dataset.id;
      state.view = 'vendor-detail';
      render();
      window.scrollTo(0, 0);
      break;
    case 'add-vendor':
      state.vendorForm = { company: '', contact: '', designation: '', booth: '', email: '', phone: '', wechat: '', website: '', address: '', vendorCategory: '', rating: 0, notes: '', cardPhoto: null, voiceNote: null };
      state.view = 'add-vendor';
      render();
      window.scrollTo(0, 0);
      break;
    case 'edit-vendor': {
      const v = state.vendors.find(x => x.id === el.dataset.id);
      if (v) { state.vendorForm = { ...v }; state.view = 'edit-vendor'; render(); window.scrollTo(0, 0); }
      break;
    }
    case 'delete-vendor':
      if (confirm('Delete this vendor and all their products?')) {
        state.vendors = state.vendors.filter(v => v.id !== el.dataset.id);
        saveState();
        state.selectedVendorId = null;
        state.view = 'vendors';
        render();
      }
      break;
    case 'save-vendor': saveVendor(); break;
    case 'cancel-form':
      if (state.view === 'add-vendor' || state.view === 'edit-vendor') {
        state.view = state.selectedVendorId ? 'vendor-detail' : 'vendors';
      } else state.view = 'vendor-detail';
      render();
      break;
    case 'capture-card': await handleCardCapture(evt); break;
    case 'capture-code': await handleCodeCapture(evt); break;
    case 'remove-card-photo':
      state.vendorForm.cardPhoto = null;
      render();
      break;
    case 'remove-code-photo':
      state.productForm.codePhoto = null;
      render();
      break;
    case 'add-product':
      state.productForm = { name: '', category: '', fabricTypes: [], composition: '', gsm: '', width: '', moq: '', price: '', leadTime: '', sample: '', barcode: '', codePhoto: null, dyeingMethod: '', photos: [], notes: '', voiceNote: null };
      state.view = 'add-product';
      render();
      window.scrollTo(0, 0);
      break;
    case 'edit-product': {
      const v = state.vendors.find(x => x.id === state.selectedVendorId);
      const p = v?.products?.find(p => p.id === el.dataset.id);
      if (p) { state.productForm = JSON.parse(JSON.stringify(p)); state.editingProductId = p.id; state.view = 'edit-product'; render(); window.scrollTo(0, 0); }
      break;
    }
    case 'delete-product':
      if (confirm('Delete this product?')) {
        const v = state.vendors.find(x => x.id === state.selectedVendorId);
        if (v) { v.products = v.products.filter(p => p.id !== el.dataset.id); saveState(); render(); }
      }
      break;
    case 'save-product': saveProduct(); break;
    case 'add-photo': await handleAddPhoto(evt); break;
    case 'remove-photo':
      state.productForm.photos.splice(parseInt(el.dataset.index), 1);
      render();
      break;
    case 'toggle-fabric': {
      const val = el.dataset.value;
      const list = state.productForm.fabricTypes || [];
      state.productForm.fabricTypes = list.includes(val) ? list.filter(x => x !== val) : [...list, val];
      render();
      break;
    }
    case 'add-fabric-type':
      openModal('Add custom fabric type', 'e.g. Velvet, Crepe…', '', (newFabric) => {
        if (newFabric) {
          if (!state.customFabricTypes.includes(newFabric) && !DEFAULT_FABRIC_TYPES.includes(newFabric)) {
            state.customFabricTypes.push(newFabric);
          }
          if (!state.productForm.fabricTypes.includes(newFabric)) {
            state.productForm.fabricTypes.push(newFabric);
          }
          saveState();
          render();
        }
      });
      break;
    case 'set-vendor-cat':
      state.vendorForm.vendorCategory = state.vendorForm.vendorCategory === el.dataset.value ? '' : el.dataset.value;
      render();
      break;
    case 'add-vendor-cat':
      openModal('Add custom vendor category', 'e.g. Trims, Yarn, Machinery…', '', (newCat) => {
        if (newCat) {
          if (!state.customVendorCategories.includes(newCat) && !DEFAULT_VENDOR_CATEGORIES.includes(newCat)) {
            state.customVendorCategories.push(newCat);
          }
          state.vendorForm.vendorCategory = newCat;
          saveState();
          render();
        }
      });
      break;
    case 'set-rating':
      const newRating = parseInt(el.dataset.value);
      state.vendorForm.rating = state.vendorForm.rating === newRating ? 0 : newRating;
      render();
      break;
    case 'filter-cat':
      state.filterCategory = el.dataset.value;
      render();
      break;
    case 'record-voice': await startVoiceRecording(); break;
    case 'stop-voice': stopVoiceRecording(); break;
    case 'delete-voice':
      if (state.view.includes('vendor')) state.vendorForm.voiceNote = null;
      else state.productForm.voiceNote = null;
      render();
      break;
    case 'email-vendor': composeEmail(el.dataset.id); break;
    case 'save-profile': saveState(); state.view = 'vendors'; render(); alert('Profile saved!'); break;
    case 'cancel-profile':
      loadState();
      state.view = 'vendors';
      render();
      break;
    case 'close-modal':
      state.modal = null;
      render();
      break;
    case 'modal-confirm':
      const input = document.getElementById('modal-input');
      const val = input ? input.value.trim() : '';
      const cb = state.modal?.callback;
      state.modal = null;
      if (cb) cb(val);
      else render();
      break;
  }
}

function openModal(title, placeholder, defaultValue, callback) {
  state.modal = { title, placeholder, defaultValue, callback };
  render();
  setTimeout(() => {
    const input = document.getElementById('modal-input');
    if (input) input.focus();
  }, 50);
}

function goBack() {
  if (state.view === 'vendor-detail') { state.view = 'vendors'; state.selectedVendorId = null; }
  else if (state.view === 'add-product' || state.view === 'edit-product') state.view = 'vendor-detail';
  else if (state.view === 'add-vendor' || state.view === 'edit-vendor') state.view = state.selectedVendorId ? 'vendor-detail' : 'vendors';
  else state.view = 'vendors';
  render();
}

async function handleCardCapture(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  try {
    state.vendorForm.cardPhoto = await compressImage(file);
    render();
  } catch (e) { alert('Could not load image'); }
}

async function handleCodeCapture(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  try {
    state.productForm.codePhoto = await compressImage(file);
    render();
  } catch (e) { alert('Could not load image'); }
}

async function handleAddPhoto(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  try {
    const compressed = await compressImage(file);
    if (!state.productForm.photos) state.productForm.photos = [];
    state.productForm.photos.push(compressed);
    render();
  } catch (e) { alert('Could not load image'); }
}

function saveVendor() {
  const f = state.vendorForm;
  if (!f.company?.trim()) { alert('Company name is required'); return; }
  if (state.view === 'add-vendor') {
    state.vendors.unshift({ ...f, id: Date.now().toString(), products: [], createdAt: Date.now() });
    state.selectedVendorId = state.vendors[0].id;
  } else {
    const v = state.vendors.find(x => x.id === state.selectedVendorId);
    if (v) Object.assign(v, f);
  }
  markChange();
  saveState();
  state.view = 'vendor-detail';
  render();
  window.scrollTo(0, 0);
  // Trigger GitHub auto-backup
  if (state.profile.githubEnabled) triggerGithubBackup();
}

function saveProduct() {
  const f = state.productForm;
  if (!f.name?.trim()) { alert('Product name is required'); return; }
  const v = state.vendors.find(x => x.id === state.selectedVendorId);
  if (!v) return;
  if (!v.products) v.products = [];
  if (state.view === 'add-product') {
    v.products.unshift({ ...f, id: Date.now().toString(), createdAt: Date.now() });
  } else {
    const p = v.products.find(p => p.id === state.editingProductId);
    if (p) Object.assign(p, f);
  }
  markChange();
  saveState();
  state.view = 'vendor-detail';
  render();
  // Trigger GitHub auto-backup
  if (state.profile.githubEnabled) triggerGithubBackup();
}

// =================== VOICE RECORDER ===================
let mediaRecorder = null;
let recordingChunks = [];
let recordingTimer = null;
let recordingStream = null;
let recordingMimeType = '';

function getSupportedAudioMime() {
  if (typeof MediaRecorder === 'undefined') return '';
  const types = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm', 'audio/ogg'];
  for (const t of types) {
    try { if (MediaRecorder.isTypeSupported(t)) return t; } catch (e) {}
  }
  return '';
}

async function startVoiceRecording() {
  if (typeof MediaRecorder === 'undefined') {
    alert('Voice recording is not supported on this browser. Please use the iPhone Voice Memos app and add details to the notes field.');
    return;
  }

  try {
    recordingStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    });
    recordingMimeType = getSupportedAudioMime();
    const options = recordingMimeType ? { mimeType: recordingMimeType } : {};
    mediaRecorder = new MediaRecorder(recordingStream, options);
    recordingChunks = [];
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordingChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordingChunks, { type: recordingMimeType || 'audio/mp4' });
      const reader = new FileReader();
      reader.onload = () => {
        if (state.view.includes('vendor')) state.vendorForm.voiceNote = reader.result;
        else state.productForm.voiceNote = reader.result;
        render();
      };
      reader.readAsDataURL(blob);
      if (recordingStream) recordingStream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();

    let elapsed = 0;
    const status = document.getElementById('voice-recording-status');
    const recordBtn = document.querySelector('[data-action="record-voice"]');
    if (recordBtn) recordBtn.style.display = 'none';
    if (status) {
      status.innerHTML = `<div style="display:flex; gap:8px; align-items:center;">
        <button class="btn btn-secondary" id="stop-rec-btn">⏹ Stop</button>
        <div class="recording-indicator"><div class="recording-dot"></div><span id="rec-timer">0:00</span></div>
      </div>`;
      document.getElementById('stop-rec-btn').addEventListener('click', stopVoiceRecording);
    }
    recordingTimer = setInterval(() => {
      elapsed++;
      const t = document.getElementById('rec-timer');
      if (t) t.textContent = `${Math.floor(elapsed/60)}:${(elapsed%60).toString().padStart(2,'0')}`;
      if (elapsed >= 180) stopVoiceRecording(); // auto-stop at 3 min
    }, 1000);
  } catch (err) {
    let msg = 'Could not start voice recording. ';
    if (err.name === 'NotAllowedError') msg += 'Please allow microphone access in Safari settings.';
    else if (err.name === 'NotFoundError') msg += 'No microphone found.';
    else msg += err.message + '\n\nTip: use the iPhone Voice Memos app and add details to the notes field.';
    alert(msg);
  }
}

function stopVoiceRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (recordingTimer) { clearInterval(recordingTimer); recordingTimer = null; }
}

function buildBackupData() {
  return {
    profile: state.profile,
    vendors: state.vendors,

    customProductCategories: state.customProductCategories,
    customFabricTypes: state.customFabricTypes,
    exportedAt: new Date().toISOString()
  };
}

function markBackupDone() {
  state.lastBackupAt = Date.now();
  state.changesSinceBackup = 0;
  saveState();
}

function exportData() {
  const json = JSON.stringify(buildBackupData(), null, 2);
  downloadFile(`batik-canton-${new Date().toISOString().split('T')[0]}.json`, json, 'application/json');

  const rows = [['Vendor', 'Category', 'Booth', 'Contact', 'Designation', 'Email', 'Phone', 'WeChat/WA', 'Website', 'Rating', 'Vendor Notes',
    'Product', 'Product Category', 'Fabric Types', 'Composition', 'GSM', 'Width', 'MOQ', 'FOB Price', 'Lead Time', 'Sample', 'Finish', 'Code', 'Product Notes']];
  state.vendors.forEach(v => {
    const phone = v.phone ? (v.phone.startsWith('+') ? v.phone : '+86 ' + v.phone) : '';
    const base = [v.company, v.vendorCategory, v.booth, v.contact, v.designation, v.email, phone, v.wechat, v.website, v.rating || '', v.notes];
    if (!v.products || v.products.length === 0) {
      rows.push([...base, '', '', '', '', '', '', '', '', '', '', '', '', '']);
    } else {
      v.products.forEach(p => {
        rows.push([...base, p.name, p.category, (p.fabricTypes || []).join('; '), p.composition, p.gsm, p.width, p.moq, p.price, p.leadTime, p.sample, p.dyeingMethod, p.barcode, p.notes]);
      });
    }
  });
  const csv = rows.map(r => r.map(c => `"${(c == null ? '' : c.toString()).replace(/"/g, '""')}"`).join(',')).join('\n');
  setTimeout(() => downloadFile(`batik-canton-${new Date().toISOString().split('T')[0]}.csv`, csv, 'text/csv'), 200);
}

// =================== GITHUB BACKUP ===================
let githubBackupTimer = null;
let githubBackupPending = false;

async function testGithubConnection() {
  const p = state.profile;
  if (!p.githubUser?.trim() || !p.githubRepo?.trim() || !p.githubToken?.trim()) {
    alert('Please fill in username, repo name, and token first.');
    return;
  }
  state.githubStatus = 'syncing';
  state.githubLastError = '';
  render();
  try {
    const url = `https://api.github.com/repos/${encodeURIComponent(p.githubUser)}/${encodeURIComponent(p.githubRepo)}`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `Bearer ${p.githubToken}`,
        'Accept': 'application/vnd.github+json'
      }
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.message || `HTTP ${res.status}`);
    }
    state.profile.githubEnabled = true;
    state.githubStatus = 'ok';
    state.githubLastError = '';
    saveState();
    alert('✓ Connected to GitHub! Auto-backup is now enabled. Every save will sync.');
    // Do an initial backup
    triggerGithubBackup(true);
  } catch (err) {
    state.githubStatus = 'error';
    state.githubLastError = err.message;
    state.profile.githubEnabled = false;
    saveState();
    alert('Could not connect: ' + err.message + '\n\nCheck username, repo name, and token permissions.');
    render();
  }
}

function triggerGithubBackup(immediate = false) {
  if (!state.profile.githubEnabled) return;
  // Debounce: wait 2 sec after last change before backing up (unless immediate)
  if (githubBackupTimer) clearTimeout(githubBackupTimer);
  if (immediate) {
    runGithubBackup();
  } else {
    githubBackupPending = true;
    githubBackupTimer = setTimeout(() => {
      githubBackupPending = false;
      runGithubBackup();
    }, 2000);
  }
}

async function runGithubBackup() {
  const p = state.profile;
  if (!p.githubEnabled) return;
  state.githubStatus = 'syncing';
  state.githubLastError = '';
  // Update UI silently if on vendor list
  updateBackupBannerOnly();

  try {
    const data = buildBackupData();
    const json = JSON.stringify(data, null, 2);
    const contentB64 = b64EncodeUnicode(json);
    const ts = new Date().toISOString().replace(/[:.]/g, '-');
    const summary = `${state.vendors.length} vendors, ${state.vendors.reduce((s,v) => s + (v.products?.length||0), 0)} products`;

    // 1) Update latest.json (overwritten each time)
    await putGithubFile(p, 'latest.json', contentB64, `Backup ${ts} — ${summary}`);

    // 2) Append timestamped history file (never overwritten)
    await putGithubFile(p, `history/${ts}.json`, contentB64, `History snapshot ${ts}`);

    state.githubStatus = 'ok';
    state.lastBackupAt = Date.now();
    state.changesSinceBackup = 0;
    saveState();
    updateBackupBannerOnly();
  } catch (err) {
    console.error('GitHub backup failed:', err);
    state.githubStatus = 'error';
    state.githubLastError = err.message;
    updateBackupBannerOnly();
  }
}

async function putGithubFile(p, path, contentB64, message) {
  const url = `https://api.github.com/repos/${encodeURIComponent(p.githubUser)}/${encodeURIComponent(p.githubRepo)}/contents/${path}`;
  // First, check if file exists to get sha (only for files we overwrite)
  let sha = null;
  if (!path.startsWith('history/')) {
    try {
      const getRes = await fetch(url, {
        headers: { 'Authorization': `Bearer ${p.githubToken}`, 'Accept': 'application/vnd.github+json' }
      });
      if (getRes.ok) {
        const data = await getRes.json();
        sha = data.sha;
      }
    } catch (e) { /* file doesn't exist, that's fine */ }
  }

  const body = { message, content: contentB64 };
  if (sha) body.sha = sha;

  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${p.githubToken}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    throw new Error(errData.message || `HTTP ${res.status}`);
  }
}

function b64EncodeUnicode(str) {
  // Handle UTF-8 properly
  return btoa(unescape(encodeURIComponent(str)));
}
function b64DecodeUnicode(str) {
  return decodeURIComponent(escape(atob(str.replace(/\s/g, ''))));
}

async function restoreFromGithub() {
  const p = state.profile;
  if (!p.githubUser || !p.githubRepo || !p.githubToken) {
    alert('GitHub not configured.');
    return;
  }
  if (!confirm('This will REPLACE your current data with the latest cloud backup. Continue?')) return;

  try {
    const url = `https://api.github.com/repos/${encodeURIComponent(p.githubUser)}/${encodeURIComponent(p.githubRepo)}/contents/latest.json`;
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${p.githubToken}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const fileData = await res.json();
    const json = b64DecodeUnicode(fileData.content);
    const data = JSON.parse(json);

    state.vendors = data.vendors || [];
    if (data.profile) {
      // Don't overwrite GitHub credentials with old ones
      const newProfile = { ...state.profile, ...data.profile };
      newProfile.githubUser = state.profile.githubUser;
      newProfile.githubRepo = state.profile.githubRepo;
      newProfile.githubToken = state.profile.githubToken;
      newProfile.githubEnabled = state.profile.githubEnabled;
      state.profile = newProfile;
    }
    if (data.customVendorCategories) state.customVendorCategories = data.customVendorCategories;
    if (data.customProductCategories) state.customProductCategories = data.customProductCategories;
    if (data.customFabricTypes) state.customFabricTypes = data.customFabricTypes;

    state.lastBackupAt = Date.now();
    state.changesSinceBackup = 0;
    saveState();
    state.view = 'vendors';
    render();
    alert(`✓ Restored ${state.vendors.length} vendors from cloud backup.`);
  } catch (err) {
    alert('Restore failed: ' + err.message);
  }
}

function updateBackupBannerOnly() {
  // Only re-render the banner area if we're on vendor list
  if (state.view !== 'vendors') return;
  const oldBanner = document.querySelector('.backup-banner');
  // Build new banner HTML
  const tmp = document.createElement('div');
  tmp.innerHTML = renderVendorList();
  const newBanner = tmp.querySelector('.backup-banner');
  if (oldBanner && newBanner) {
    oldBanner.replaceWith(newBanner);
    attachEventListeners();
  } else if (newBanner) {
    document.querySelector('.search-section')?.before(newBanner);
    attachEventListeners();
  } else if (oldBanner) {
    oldBanner.remove();
  }
}

async function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.vendors) throw new Error('Invalid backup file');
    if (!confirm(`Import ${data.vendors.length} vendors? This will REPLACE your current data.`)) {
      e.target.value = '';
      return;
    }
    state.vendors = data.vendors;
    if (data.profile) state.profile = { ...state.profile, ...data.profile };
    if (data.customVendorCategories) state.customVendorCategories = data.customVendorCategories;
    if (data.customProductCategories) state.customProductCategories = data.customProductCategories;
    if (data.customFabricTypes) state.customFabricTypes = data.customFabricTypes;
    saveState();
    render();
    alert('Import complete!');
  } catch (err) {
    alert('Could not import: ' + err.message);
  }
  e.target.value = '';
}

function downloadFile(name, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

// =================== INIT ===================
loadState();
// If GitHub was previously enabled, mark status as ok by default (will fail visibly if token expired)
if (state.profile.githubEnabled) state.githubStatus = 'ok';
render();
</script>
